{% extends 'base.html' %}

{% block content %}

<h2>Create Task</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text"
           name="title"
           class="form-control mb-3"
           placeholder="Task Title">

    <select name="project"
            class="form-control mb-3">

        {% for project in projects %}

        <option value="{{ project.id }}">
            {{ project.name }}
        </option>

        {% endfor %}

    </select>

    <select name="user"
            class="form-control mb-3">

        {% for user in users %}

        <option value="{{ user.id }}">
            {{ user.username }}
        </option>

        {% endfor %}

    </select>

    <input type="date"
           name="due_date"
           class="form-control mb-3">

    <button class="btn btn-primary">
        Create Task
    </button>

</form>

{% endblock %}
