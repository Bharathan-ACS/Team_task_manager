{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card p-4 shadow">
            <h3 class="text-center">
                Signup
            </h3>
            <form method="POST">
                {% csrf_token %}
                <input type="text"
                       name="username"
                       class="form-control mb-3"
                       placeholder="Username">

                <input type="password"
                       name="password"
                       class="form-control mb-3"
                       placeholder="Password">

                <select name="role"
                        class="form-control mb-3">

                    <option value="admin">
                        Admin
                    </option>

                    <option value="member">
                        Member
                    </option>

                </select>
                <button class="btn btn-success w-100">
                    Signup
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
